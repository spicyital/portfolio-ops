name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package and development tools
        run: python -m pip install ".[dev]"
      - name: Verify formatting
        run: ruff format --check .
      - name: Lint
        run: ruff check .
      - name: Run tests
        run: pytest
      - name: Verify package import
        run: python -c "import portfolio_ops; print(portfolio_ops.__version__)"
      - name: Verify CLI help
        run: python -m portfolio_ops.cli --help
