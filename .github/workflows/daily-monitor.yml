name: Daily public-service monitor

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: portfolio-ops-daily-monitor-${{ github.repository }}
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package and development tools
        run: python -m pip install ".[dev]"
      - name: Run tests before monitoring
        run: pytest
      - name: Check public targets
        env:
          MONITOR_TARGETS_JSON: ${{ vars.MONITOR_TARGETS_JSON }}
        run: python -m portfolio_ops.cli check
      - name: Regenerate public summaries
        run: python -m portfolio_ops.cli summary
      - name: Commit daily status when generated files changed
        run: |
          if git diff --quiet -- data/uptime.csv data/latest-status.json data/status-summary.md; then
            echo "No monitored output changed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/uptime.csv data/latest-status.json data/status-summary.md
          git commit -m "chore(monitor): record daily public-service status"
          git push origin "HEAD:${{ github.event.repository.default_branch }}"
